{% extends 'base.html' %}
{% block title %}Delete Designation | PIMS{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto space-y-8">
    <div class="bg-white rounded-xl shadow-sm border border-red-200 overflow-hidden">
        <div class="p-8 space-y-6">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0">
                    <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
                    </svg>
                </div>
                <div>
                    <h2 class="text-lg font-black text-slate-900">Delete Designation</h2>
                    <p class="text-sm text-slate-500">This action cannot be undone.</p>
                </div>
            </div>

            <p class="text-sm text-slate-700">
                Are you sure you want to delete <span class="font-bold text-slate-900">{{ object.name }}</span>?
                Staff assigned this designation will have it cleared.
            </p>

            <form method="post" class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                {% csrf_token %}
                <a href="{% url 'organization:designation_list' %}"
                   class="px-5 py-2.5 text-[10px] font-bold text-slate-600 hover:text-slate-900 uppercase tracking-widest transition-colors">
                    Cancel
                </a>
                <button type="submit"
                        class="px-6 py-2.5 bg-red-600 hover:bg-red-700 text-white text-[10px] font-bold rounded-lg shadow-sm transition-all uppercase tracking-widest">
                    Delete Designation
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
