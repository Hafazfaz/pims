<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #007bff; color: white; padding: 15px; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 5px 5px; }
        .btn { display: inline-block; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PIMS Notification</h2>
        </div>
        <div class="content">
            <p>Dear {{ user.get_full_name|default:user.username }},</p>
            <p>{{ message }}</p>
            {% if link %}
            <p><a class="btn" href="{{ link }}">View Details</a></p>
            {% endif %}
            <div class="footer">
                <p>This is an automated notification from the PIMS system.</p>
            </div>
        </div>
    </div>
</body>
</html>
