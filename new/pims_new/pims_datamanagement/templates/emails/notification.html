<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIMS Notification</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            background-color: #f8fafc;
            width: 100%;
            padding: 40px 0;
        }
        .container {
            max-width: 580px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }
        .top-bar {
            height: 6px;
            background: linear-gradient(90deg, #008751 0%, #006B40 100%);
        }
        .header {
            padding: 32px 32px 20px;
            border-bottom: 1px solid #f1f5f9;
        }
        .header h2 {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.02em;
        }
        .header-sub {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #008751;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .content {
            padding: 32px;
        }
        .greeting {
            font-size: 16px;
            font-weight: 600;
            color: #0f172a;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .message-body {
            font-size: 15px;
            color: #475569;
            margin-bottom: 28px;
        }
        .btn-wrapper {
            margin: 28px 0;
        }
        .btn {
            display: inline-block;
            background-color: #008751;
            color: #ffffff !important;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            text-align: center;
            transition: background-color 0.2s ease;
        }
        .footer {
            padding: 24px 32px;
            background-color: #f8fafc;
            border-top: 1px solid #f1f5f9;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
        .footer-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #334155;
            font-size: 14px;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="top-bar"></div>
            <div class="header">
                <div class="header-sub">Personnel Information Management System</div>
                <h2>Notification Alert</h2>
            </div>
            <div class="content">
                <p class="greeting">Dear {{ user.get_full_name|default:user.username }},</p>
                <p class="message-body">{{ message }}</p>
                {% if link %}
                <div class="btn-wrapper">
                    <a class="btn" href="{{ link }}">View Details</a>
                </div>
                {% endif %}
            </div>
            <div class="footer">
                <div class="footer-logo">FMC Abuja • PIMS</div>
                <p style="margin: 0;">This is an automated notification from the Personnel Information Management System.</p>
            </div>
        </div>
    </div>
</body>
</html>
